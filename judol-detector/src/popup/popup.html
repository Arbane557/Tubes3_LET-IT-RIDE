<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="width:200px;padding:12px;font-family:sans-serif">
  <h3>LET IT RIDE</h3>

  <div style="margin-bottom: 8px;">
    <label for="algo-select" style="font-size: 12px; font-weight: bold;">Exact Algorithm:</label>
    <select id="algo-select" style="width: 100%; margin-top: 4px; padding: 2px;">
      <option value="kmp">Knuth-Morris-Pratt (KMP)</option>
      <option value="bm">Boyer-Moore (BM)</option>
      <option value="aho-corasick">Aho-Corasick</option>
      <option value="rabin-karp">Rabin-Karp</option>
    </select>
  </div>

  <button id="rescanButton" type="button">Rescan</button>
  <button id="blur-toggle" type="button">Blur: OFF</button>
  <select id="algo-select" aria-label="Algorithm" style="margin-left:8px">
    <option value="kmp">KMP</option>
    <option value="bm">BM</option>
  </select>
  <p id="status" aria-live="polite"></p>

  <div id="stats" style="margin-top:8px;font-size:12px">
    <div id="stats-total">Total keywords: 0</div>
    <div id="stats-per-alg" style="margin-top:8px"></div>
    <div id="stats-time" style="margin-top:8px"></div>
    <div id="stats-keywords" style="margin-top:8px"></div>
  </div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
